<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Chat | vadyms22</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(10, 16, 32, 0.88);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #b8c3d9;
      --accent: #00d1b2;
      --accent-2: #7dd3fc;
      --danger: #fb7185;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 209, 178, 0.2), transparent 28%),
        radial-gradient(circle at top right, rgba(125, 211, 252, 0.14), transparent 24%),
        linear-gradient(160deg, #020617 0%, #0f172a 58%, #111827 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 1120px);
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(320px, 1fr);
      gap: 24px;
      align-items: stretch;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .intro {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 0.95;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .meta {
      display: grid;
      gap: 12px;
    }

    .meta-row {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .meta-label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-2);
      margin-bottom: 6px;
    }

    .meta-value {
      margin: 0;
      color: var(--text);
      word-break: break-word;
    }

    .hint {
      margin: 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(2, 132, 199, 0.12);
      border: 1px solid rgba(125, 211, 252, 0.22);
      color: var(--text);
      line-height: 1.5;
    }

    .hint.is-warning {
      background: rgba(190, 24, 93, 0.16);
      border-color: rgba(251, 113, 133, 0.28);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      color: #03251f;
    }

    .button-secondary {
      background: rgba(148, 163, 184, 0.12);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .chat-panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 760px;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .chat-title {
      margin: 0;
      font-size: 1.05rem;
    }

    .chat-status {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .chat-frame {
      width: 100%;
      min-height: 680px;
      border: 0;
      border-radius: 18px;
      background: #0f172a;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.95em;
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        min-height: 620px;
      }

      .chat-frame {
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card intro">
      <p class="eyebrow">Twitch Embed</p>
      <h1>Twitch chat for<br>vadyms22</h1>
      <p class="lead">
        This page embeds the official Twitch chat and shows channel messages in real time.
      </p>

      <div class="meta">
        <div class="meta-row">
          <span class="meta-label">Channel</span>
          <p class="meta-value" id="channel-name">vadyms22</p>
        </div>
        <div class="meta-row">
          <span class="meta-label">Current parent</span>
          <p class="meta-value" id="parent-value">Detecting...</p>
        </div>
        <div class="meta-row">
          <span class="meta-label">Mode</span>
          <p class="meta-value" id="mode-value">Checking environment...</p>
        </div>
      </div>

      <p class="hint" id="info-box">
        Preparing Twitch chat iframe...
      </p>

      <div class="actions">
        <button class="button button-primary" id="reload-chat" type="button">Reload chat</button>
        <a class="button button-secondary" id="open-popout" href="https://www.twitch.tv/popout/vadyms22/chat" target="_blank" rel="noreferrer">
          Open popout
        </a>
      </div>
    </section>

    <section class="card chat-panel">
      <div class="chat-header">
        <div>
          <h2 class="chat-title">Twitch messages</h2>
          <p class="chat-status" id="chat-status">Waiting for initialization...</p>
        </div>
      </div>

      <iframe
        id="twitch-chat"
        class="chat-frame"
        title="Twitch chat for vadyms22"
        loading="lazy"
        allow="clipboard-write"
      ></iframe>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
