<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floorball – Rellena los huecos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 30px 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    color: #00d4ff;
    margin-bottom: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 24px;
    font-size: 0.9rem;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
    font-size: 0.95rem;
  }
  .stat { color: #aaa; }
  .stat span { color: #00d4ff; font-weight: bold; }
  .text-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 820px;
    margin: 0 auto 24px;
    line-height: 2.1;
    font-size: 1rem;
  }
  .text-box h2 {
    color: #00d4ff;
    font-size: 1.1rem;
    margin: 18px 0 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .text-box h2:first-child { margin-top: 0; }
  input.blank {
    background: #0f3460;
    border: 2px solid #00d4ff44;
    border-radius: 6px;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    padding: 2px 6px;
    width: var(--w, 100px);
    min-width: 60px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    vertical-align: middle;
    text-align: center;
  }
  input.blank:focus { border-color: #00d4ff; background: #163060; }
  input.blank.correct {
    border-color: #00e676;
    background: #003320;
    color: #00e676;
  }
  input.blank.wrong {
    border-color: #ff5252;
    background: #330000;
    color: #ff5252;
    animation: shake 0.3s;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
  }
  .buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    max-width: 820px;
    margin: 0 auto 20px;
  }
  button {
    padding: 12px 26px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    letter-spacing: 0.5px;
  }
  button:hover { transform: scale(1.04); }
  #btn-check { background: #00d4ff; color: #000; }
  #btn-reveal { background: #ff9800; color: #000; }
  #btn-new { background: #7c4dff; color: #fff; }
  .message {
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
    min-height: 28px;
    margin-bottom: 10px;
    color: #00e676;
  }
  .hint {
    text-align: center;
    font-size: 0.8rem;
    color: #555;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h1>⚽ Teoría Floorball</h1>
<p class="subtitle">Rellena los 40 huecos con la palabra correcta</p>

<div class="stats">
  <div class="stat">Correctas: <span id="score">0</span> / <span id="total">0</span></div>
  <div class="stat">Errores: <span id="errors">0</span></div>
</div>

<div class="text-box" id="text-container"></div>

<div class="message" id="message"></div>

<div class="buttons">
  <button id="btn-check">✔ Comprobar</button>
  <button id="btn-reveal">👁 Revelar respuestas</button>
  <button id="btn-new">🔄 Nueva partida</button>
</div>

<p class="hint">Pulsa "Comprobar" para ver si tus respuestas son correctas. "Nueva partida" mezcla otros 40 huecos.</p>

<script>
// ── Full text as array of tokens (words + punctuation) ──────────────────────
// We store the text as segments: {text, isWord}
// Words are the candidates for blanks.

const FULL_TEXT_HTML = `<h2>TEORÍA FLOORBALL</h2>
<h2>1. ANTECEDENTES HISTÓRICOS</h2>
<p>- Hockey nace como deporte a finales del S. XIX en Inglaterra. Tiene 4 modalidades: Hockey hierba, hockey patines, hockey hielo y hockey sala.</p>
<p>- El floorball nace a mediados de la década de los 80, en los países nórdicos (Noruega y Suecia), con una doble finalidad:</p>
<p>1. Disminuir la peligrosidad del hockey.</p>
<p>2. Abaratar los costes económicos de materiales e instalaciones.</p>
<h2>2. MATERIALES Y TERRENO DE JUEGO</h2>
<p><strong>Materiales</strong></p>
<p>- Stick: compuesto por mango y pala (la pala es plana por ambos lados, al igual que el hockey hielo y hockey patines).</p>
<p>- Bola: ligera, de plástico y agujereada.</p>
<p>- Portería: igual que la de hockey hielo (105cm x 90cm).</p>
<p><strong>Terreno juego</strong></p>
<p>- Tiene que ser rectangular, siendo el lado largo doble al ancho.</p>
<h2>3. TIPOS DE PASE</h2>
<p>- Push: pase en acción de barrido.</p>
<p>- Slap: pase en acción de golpeo.</p>
<p>- Cuchara: pase elevado.</p>
<h2>4. PRINCIPALES ACCIONES TÉCNICAS</h2>
<p>- Toque: acción técnica individual que utiliza el jugador que tiene posesión de la bola para desplazarse por el terreno de juego, utilizando ambas caras de la pala del stick.</p>
<p>- Conducción: acción técnica individual que utiliza el jugador que tiene posesión de la bola para desplazarse por el terreno de juego, utilizando una sola cara de la pala del stick.</p>
<p>- Finta: acción técnica que utiliza un atacante para desequilibrar a un defensa.</p>
<p>- Saques:</p>
<p>Inicio: desde el punto centro del campo el árbitro la deja botar, y dos jugadores de cada equipo la disputan.</p>
<p>Gol: desde el punto central y hacia atrás.</p>
<p>Neutral: desde el punto el árbitro la deja botar, igual que el saque de inicio.</p>
<h2>5. LANZAMIENTOS</h2>
<p>- Penalty: (como en balonmano) a 7 metros de la portería. Toda falta cometida dentro del área es penalty.</p>
<h2>FLOORBALL</h2>
<p>Es una modificación deportiva del hockey que se utiliza para facilitar el aprendizaje de un deporte caro y peligroso en un colegio o un centro deportivo.</p>`;

// Extract all plain words from HTML (preserving order)
function extractWords(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const words = [];
  function walk(node) {
    if (node.nodeType === 3) { // text node
      const matches = [...node.textContent.matchAll(/[A-Za-záéíóúüñÁÉÍÓÚÜÑçÇ0-9]+/g)];
      matches.forEach(m => words.push({ word: m[0], index: m.index, node }));
    } else {
      node.childNodes.forEach(walk);
    }
  }
  walk(tmp);
  return words;
}

// Build game HTML: replace chosen words with inputs
function buildGame(chosenIndices) {
  // We'll work on a clone and replace text nodes
  const tmp = document.createElement('div');
  tmp.innerHTML = FULL_TEXT_HTML;

  // Collect all text nodes with their words
  const textNodes = [];
  function walk(node) {
    if (node.nodeType === 3) {
      textNodes.push(node);
    } else {
      node.childNodes.forEach(walk);
    }
  }
  walk(tmp);

  // Words to NEVER blank out: articles, prepositions, conjunctions, short fillers, numbers/codes
  const STOPWORDS = new Set([
    // articles
    'el','la','los','las','un','una','unos','unas',
    // prepositions
    'a','ante','bajo','con','contra','de','desde','en','entre','hacia','hasta',
    'para','por','según','sin','sobre','tras','durante','mediante',
    // conjunctions
    'y','e','o','u','ni','pero','sino','aunque','porque','que','si','como',
    'cuando','donde','mientras','pues','ya','también','además','tanto',
    // pronouns / determiners
    'al','del','su','sus','se','le','lo','les','me','mi','mis','tu','te',
    'nos','es','son','ser','ha','han','hay','se','al',
    // common verbs (copula/aux)
    'es','son','fue','fueron','tiene','tienen','tiene','hay',
    // numbers as words
    'uno','dos','tres','cuatro',
    // single letters & abbreviations that slip through
    's','x','cm',
  ]);

  function isContentWord(w) {
    // Exclude pure numbers or mixed short codes like "80", "XIX", "105cm", "90cm", "7"
    if (/^\d+$/.test(w)) return false;          // pure digits
    if (/^[IVXLCDM]+$/.test(w)) return false;   // Roman numerals
    if (w.length <= 2) return false;             // very short tokens
    if (STOPWORDS.has(w.toLowerCase())) return false;
    return true;
  }

  // Build a flat list of all words across all text nodes
  let wordIdx = 0;
  const wordMap = []; // [{nodeIdx, matchIdx, word}]
  textNodes.forEach((tn, ni) => {
    const matches = [...tn.textContent.matchAll(/[A-Za-záéíóúüñÁÉÍÓÚÜÑçÇ0-9]+/g)];
    matches.forEach(m => {
      if (isContentWord(m[0])) {
        wordMap.push({ nodeIdx: ni, start: m.index, end: m.index + m[0].length, word: m[0], globalIdx: wordIdx });
        wordIdx++;
      }
    });
  });

  // For each text node, rebuild its content replacing chosen words with placeholders
  const blankWords = [];
  const nodeReplacements = {}; // nodeIdx -> array of {start,end,word,blankId}
  chosenIndices.forEach(gi => {
    const w = wordMap[gi];
    if (!nodeReplacements[w.nodeIdx]) nodeReplacements[w.nodeIdx] = [];
    nodeReplacements[w.nodeIdx].push({ start: w.start, end: w.end, word: w.word, blankId: blankWords.length });
    blankWords.push(w.word);
  });

  // Replace text nodes
  textNodes.forEach((tn, ni) => {
    const replacements = nodeReplacements[ni];
    if (!replacements || replacements.length === 0) return;
    // Sort by start desc to replace from end
    replacements.sort((a, b) => a.start - b.start);
    const text = tn.textContent;
    const frag = document.createDocumentFragment();
    let pos = 0;
    replacements.forEach(r => {
      if (r.start > pos) frag.appendChild(document.createTextNode(text.slice(pos, r.start)));
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'blank';
      inp.dataset.answer = r.word.toLowerCase();
      inp.dataset.blankId = r.blankId;
      inp.style.setProperty('--w', Math.max(60, r.word.length * 13) + 'px');
      inp.placeholder = '?';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      frag.appendChild(inp);
      pos = r.end;
    });
    if (pos < text.length) frag.appendChild(document.createTextNode(text.slice(pos)));
    tn.parentNode.replaceChild(frag, tn);
  });

  return { html: tmp.innerHTML, blankWords };
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let totalBlanks = 0;
let errorCount = 0;

function startGame() {
  errorCount = 0;
  document.getElementById('message').textContent = '';
  document.getElementById('errors').textContent = '0';

  // Count only content words (same filter as buildGame)
  const STOP = new Set([
    'el','la','los','las','un','una','unos','unas',
    'a','ante','bajo','con','contra','de','desde','en','entre','hacia','hasta',
    'para','por','según','sin','sobre','tras','durante','mediante',
    'y','e','o','u','ni','pero','sino','aunque','porque','que','si','como',
    'cuando','donde','mientras','pues','ya','también','además','tanto',
    'al','del','su','sus','se','le','lo','les','me','mi','mis','tu','te',
    'nos','es','son','ser','ha','han','hay',
    'fue','fueron','tiene','tienen',
    'uno','dos','tres','cuatro','s','x','cm',
  ]);
  function isContent(w) {
    if (/^\d+$/.test(w)) return false;
    if (/^[IVXLCDM]+$/.test(w)) return false;
    if (w.length <= 2) return false;
    if (STOP.has(w.toLowerCase())) return false;
    return true;
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = FULL_TEXT_HTML;
  let contentCount = 0;
  function walk(node) {
    if (node.nodeType === 3) {
      const matches = [...node.textContent.matchAll(/[A-Za-záéíóúüñÁÉÍÓÚÜÑçÇ0-9]+/g)];
      matches.forEach(m => { if (isContent(m[0])) contentCount++; });
    } else { node.childNodes.forEach(walk); }
  }
  walk(tmp);

  const indices = shuffle([...Array(contentCount).keys()]).slice(0, 40);
  const { html, blankWords } = buildGame(indices);

  const container = document.getElementById('text-container');
  container.innerHTML = html;
  totalBlanks = blankWords.length;
  document.getElementById('total').textContent = totalBlanks;
  document.getElementById('score').textContent = '0';

  // Enter key moves to next blank
  const inputs = container.querySelectorAll('input.blank');
  inputs.forEach((inp, i) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (inputs[i + 1]) inputs[i + 1].focus();
        else checkAnswers();
      }
    });
    inp.addEventListener('input', () => {
      inp.classList.remove('correct', 'wrong');
      updateScore();
    });
  });
}

function updateScore() {
  const inputs = document.querySelectorAll('input.blank');
  let correct = 0;
  inputs.forEach(inp => {
    if (inp.value.trim().toLowerCase() === inp.dataset.answer) correct++;
  });
  document.getElementById('score').textContent = correct;
  return correct;
}

function checkAnswers() {
  const inputs = document.querySelectorAll('input.blank');
  let newErrors = 0;
  inputs.forEach(inp => {
    if (inp.classList.contains('correct')) return;
    const val = inp.value.trim().toLowerCase();
    if (val === '') return;
    if (val === inp.dataset.answer) {
      inp.classList.add('correct');
      inp.classList.remove('wrong');
    } else {
      inp.classList.add('wrong');
      inp.classList.remove('correct');
      newErrors++;
    }
  });
  errorCount += newErrors;
  document.getElementById('errors').textContent = errorCount;

  const correct = updateScore();
  if (correct === totalBlanks) {
    document.getElementById('message').textContent = '🎉 ¡Perfecto! ¡Has completado todos los huecos!';
  } else {
    document.getElementById('message').textContent = `✔ ${correct}/${totalBlanks} correctas. Sigue intentando...`;
  }
}

function revealAnswers() {
  const inputs = document.querySelectorAll('input.blank');
  inputs.forEach(inp => {
    inp.value = inp.dataset.answer;
    inp.classList.add('correct');
    inp.classList.remove('wrong');
  });
  updateScore();
  document.getElementById('message').textContent = '👁 Respuestas reveladas.';
}

document.getElementById('btn-check').addEventListener('click', checkAnswers);
document.getElementById('btn-reveal').addEventListener('click', revealAnswers);
document.getElementById('btn-new').addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
