<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OSAVELKAO Панель</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0a0015;
      color: #d0c0ff;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 220px 1fr 320px;
      grid-template-rows: auto 1fr;
    }

    .sidebar {
      grid-row: 1 / 3;
      background: linear-gradient(to bottom, #140033, #0a0015);
      border-right: 3px solid #7700dd;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar button {
      background: linear-gradient(to right, #7700dd, #dd00bb);
      border: none;
      color: white;
      padding: 12px 8px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 0.95em;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      box-shadow: 0 0 12px rgba(221,0,187,0.5);
    }

    .sidebar button:hover {
      transform: scale(1.04);
      box-shadow: 0 0 25px rgba(221,0,187,0.8);
    }

    .timer-block {
      margin-top: auto;
      text-align: center;
    }

    .timer {
      font-size: 2.4em;
      font-weight: bold;
      color: #ff00ff;
      text-shadow: 0 0 18px #ff00ff, 0 0 30px #ff00ff80;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .header {
      background: linear-gradient(to right, #7700ff, #ff00aa);
      color: white;
      padding: 10px;
      font-weight: bold;
      text-align: center;
      font-size: 1.1em;
      border-bottom: 3px solid #ff00ff;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #000;
    }

    .main-block {
      background: #120022;
      border: 3px solid #cc00ff;
      border-radius: 10px;
      overflow: hidden;
      margin: 12px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 30px rgba(204,0,255,0.35);
      position: relative;
    }

    .participants { grid-column: 2; grid-row: 1; }
    .chat        { grid-column: 2; grid-row: 2; margin-top: 0; }
    .top         { grid-column: 3; grid-row: 1 / 3; }

    .empty-text {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9988bb;
      font-style: italic;
      font-size: 1.2em;
    }

    .tg-note {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: #aa88ff;
      font-size: 0.75em;
      opacity: 0.8;
      pointer-events: none;
    }

    .drag-icon {
      font-size: 3em;
      color: #ff00ff;
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Левый сайдбар -->
  <div class="sidebar">
    <button>СБРОС ВСЕГО</button>
    <button>ХОД: 22</button>
    <button>РУЛЕТКА</button>
    <button>БЫСТРЫЙ РОЛЛ</button>
    <button>АНАЛИТИКА ПРОЕКТОВ</button>
    <button>ИСТОРИЯ ВЫПАДЕНИЙ</button>

    <div class="timer-block">
      <div class="timer">00:10:00</div>
      <button style="background: linear-gradient(#00dd77, #009944); width: 85%; padding: 14px; font-size:1em;">СТАРТ / ПАУЗА</button>
    </div>

    <button style="margin-top: 15px; background: #333366; border: 1px solid #7777aa; box-shadow: none; font-size:0.9em;">
      СКОПИРОВАТЬ УЧАСТНИКОВ
    </button>

    <div style="margin-top: auto; text-align: center; font-size: 0.8em; color: #aa88ff;">
      (TG → VADYMТМ90)
    </div>
  </div>

  <!-- Список участников -->
  <div class="main-block participants">
    <div class="header">СПИСОК УЧАСТНИКОВ 0</div>
    <div class="empty-text">
      Нет участников
      <div class="drag-icon">↔</div>
    </div>
  </div>

  <!-- Чат Twitch – с правильным parent -->
  <div class="main-block chat">
    <div class="header">ОБЩИЙ ЧАТ vadyms22 (Twitch)</div>
    <div style="flex: 1; position: relative; overflow: hidden; background: #0e0e1f;">
      <iframe 
        src="https://www.twitch.tv/embed/vadyms22/chat?parent=dddddddddgaaaa.github.io&darkpopout"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
        frameborder="0"
        scrolling="yes"
        allowfullscreen>
      </iframe>
    </div>
    <div class="tg-note">(TG → VADYMТМ90)</div>
  </div>

  <!-- Топ (выводы) -->
  <div class="main-block top">
    <div class="header">ТОП (ВЫВОДЫ)</div>
    <div class="empty-text">
      Пока пусто
      <div class="drag-icon">↔</div>
    </div>
    <div class="tg-note">(TG → VADYMТМ90)</div>
  </div>

</body>
</html>
